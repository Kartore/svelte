engineStrict: true
registries:
  '@kartore-internal': https://npm.pkg.github.com/

enableGlobalVirtualStore: true

configDependencies:
  '@pnpm/pacquet': 0.11.12

packageExtensions:
  '@sveltejs/kit@3.0.0-next.10':
    dependencies:
      rolldown: ^1.1.2

minimumReleaseAgeExclude:
  - '@kartore-internal/github-adapter'
  - '@kartore/file-adapter'
  - '@kartore/spritore@0.2.0'
  - '@kartore/glyphore@0.2.0'
allowBuilds:
  esbuild: false
  sharp: false
  workerd: false
